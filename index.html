<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: #F5F5F2; }
#root { min-height: 100vh; }

:root {
  --bg: #F5F5F2; --surface: #FFFFFF; --ink: #211D1B; --ink-soft: #6E6862;

.cv-nav-btn:hover { background: #F0EDE6; color: var(--ink); }

@keyframes cv-rotate { to { transform: rotate(360deg); } }
.cv-panel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; max-width: 560px; }

.cv-service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cv-service-grid > div { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: 8px; padding: 9px 11px; font-size: 12.5px; }
.cv-suggestions { display: grid; gap: 12px; margin-top: 20px; max-width: 560px; }
.cv-suggestion-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; position: relative; }
.cv-suggestion-num { position: absolute; top: -10px; left: 14px; background: var(--wine-deep); color: #fff; font-family: 'IBM Plex Mono'; font-size: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cv-suggestion-card h4 { font-family: 'Fraunces', serif; margin: 4px 0 6px; font-size: 15.5px; }
.cv-why { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
.cv-analysis { margin-top: 22px; max-width: 640px; }
.cv-analysis h3 { font-family: 'Fraunces', serif; font-size: 20px; margin: 0 0 14px; }
.cv-analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cv-analysis-item { display: flex; gap: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
.cv-analysis-item span.lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--ink-soft); }
.cv-analysis-item p { margin: 3px 0 0; font-size: 13px; line-height: 1.4; }
.cv-detail-head { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
.cv-detail-visual { width: 90px; height: 90px; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }

.cv-detail-grid > div { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.cv-detail-grid strong { display: block; font-family: 'IBM Plex Mono'; font-size: 14px; margin-top: 2px; }
.cv-notes { font-size: 13px; background: var(--bg); border-radius: 8px; padding: 10px 12px; display: flex; gap: 8px; }
.cv-key-row { display: flex; gap: 8px; align-items: center; }
.cv-key-row input { flex: 1; }
.cv-key-status { display: flex; align-items: center; gap: 6px; font-size: 12.5px; margin-top: 8px; }

@media (max-width: 760px) {
  .cv-root { flex-direction: column; }

  .cv-sidebar nav { flex-direction: row; flex: none; }

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------------------------------------------------------
   ICONES (emoji, aucune dépendance externe)
--------------------------------------------------------- */
const EMOJI = {
  wine: "🍷", camera: "📷", plus: "➕", minus: "➖", chef: "👨‍🍳", scan: "🔎",
  grape: "🍇", thermo: "🌡️", clock: "⏱️", sparkles: "✨", close: "✕",
  trend: "📈", euro: "💶", calendar: "📅", notes: "📝", chevron: "›",
  check: "✅", alert: "⚠️", glass: "🥂", info: "ℹ️", gear: "⚙️", key: "🔑",
};
function Icon({ name, size = 15 }) {
  return <span className="cv-emoji" style={{ fontSize: size, width: size + 2, height: size + 2 }}>{EMOJI[name] || ""}</span>;
}

/* ---------------------------------------------------------
   CONFIG
--------------------------------------------------------- */
const WINE_TYPES = {
  rouge:        { label: "Rouge",        body: "#6E1530", shoulder: "#4E0F22", label_bg: "#F3E6EA" },
  blanc:        { label: "Blanc",        body: "#D9C671", shoulder: "#B8A252", label_bg: "#F7F3E3" },
  rose:         { label: "Rosé",         body: "#E8A8B0", shoulder: "#D6828D", label_bg: "#FBEAEC" },
  effervescent: { label: "Effervescent", body: "#CBA653", shoulder: "#A9863C", label_bg: "#F6EFDC" },
};
const TYPE_ORDER = ["rouge", "blanc", "rose", "effervescent"];
const API_URL = "https://api.anthropic.com/v1/messages";
const MODEL = "claude-sonnet-4-6";
const LS_DATA_KEY = "cv-cave-data";
const LS_API_KEY = "cv-api-key";

/* ---------------------------------------------------------
   HELPERS
--------------------------------------------------------- */
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function fileToResizedBase64(file, maxDim = 1000, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lecture du fichier impossible"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Image illisible"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round((width * maxDim) / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality).split(",")[1]);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function extractJSON(text) {
  if (!text) return null;
  let cleaned = text.trim().replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
  const start = cleaned.indexOf("{"); const end = cleaned.lastIndexOf("}");
  if (start === -1 || end === -1) return null;
  try { return JSON.parse(cleaned.slice(start, end + 1)); } catch { return null; }
}

function getApiKey() { return localStorage.getItem(LS_API_KEY) || ""; }

async function callClaude({ system, text, images = [], webSearch = false, maxTokens = 1200 }) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error("Aucune clé API renseignée. Ouvre Réglages pour l'ajouter.");
  const content = [];
  images.forEach((img) => content.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: img } }));
  if (text) content.push({ type: "text", text });
  const body = { model: MODEL, max_tokens: maxTokens, system, messages: [{ role: "user", content }] };
  if (webSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const errBody = await res.text();
    throw new Error("Erreur API (" + res.status + ") : " + errBody.slice(0, 200));
  }
  const data = await res.json();
  return (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
}

/* ---------------------------------------------------------
   STOCKAGE LOCAL (localStorage, propre à cet appareil/navigateur)
--------------------------------------------------------- */
function loadCaveData() {
  try {
    const raw = localStorage.getItem(LS_DATA_KEY);
    if (raw) return JSON.parse(raw);
  } catch {}
  return { bottles: [], movements: [] };
}
function saveCaveData(data) {
  try { localStorage.setItem(LS_DATA_KEY, JSON.stringify(data)); } catch (e) { console.error("Sauvegarde impossible", e); }
}

/* ---------------------------------------------------------
   ICONE BOUTEILLE (signature visuelle, SVG pur)
--------------------------------------------------------- */
function BottleIcon({ type = "rouge", size = 56 }) {
  const t = WINE_TYPES[type] || WINE_TYPES.rouge;
  return (
    <svg width={size} height={size * 1.85} viewBox="0 0 44 82" fill="none">
      <rect x="18" y="0" width="8" height="10" rx="1.5" fill={type === "effervescent" ? "#C9A15A" : t.shoulder} />
      <path d="M17 10 H27 V22 C27 22 34 28 34 40 V76 C34 79.3 31.3 82 28 82 H16 C12.7 82 10 79.3 10 76 V40 C10 28 17 22 17 22 Z" fill={t.body} />
      <path d="M17 10 H27 V22 C27 22 24.5 24.5 22 24.5 C19.5 24.5 17 22 17 22 Z" fill={t.shoulder} opacity="0.9" />
      <rect x="10" y="46" width="24" height="17" fill={t.label_bg} opacity="0.95" />
      <rect x="10" y="46" width="24" height="17" fill="none" stroke={t.shoulder} strokeWidth="0.6" opacity="0.5" />
    </svg>
  );
}

/* ---------------------------------------------------------
   PRIMITIVES UI
--------------------------------------------------------- */
function Modal({ title, onClose, children }) {
  return (
    <div className="cv-modal-overlay" onMouseDown={(e) => e.target === e.currentTarget && onClose()}>
      <div className="cv-modal">
        <div className="cv-modal-head">
          <h3>{title}</h3>
          <button className="cv-icon-btn" onClick={onClose} aria-label="Fermer"><Icon name="close" size={16} /></button>
        </div>
        <div className="cv-modal-body">{children}</div>
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return <label className="cv-field"><span>{label}</span>{children}</label>;
}
function Spinner({ label }) {
  return <div className="cv-spinner"><span className="cv-spin-circle"></span><span>{label}</span></div>;
}

/* ---------------------------------------------------------
   RÉGLAGES (clé API)
--------------------------------------------------------- */
function SettingsModal({ onClose }) {
  const [key, setKey] = useState(getApiKey());
  const [saved, setSaved] = useState(false);
  function save() {
    localStorage.setItem(LS_API_KEY, key.trim());
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }
  return (
    <Modal title="Réglages" onClose={onClose}>
      <p className="cv-small cv-muted">
        Les fonctions IA (lecture d'étiquette, accords mets-vins, analyse) appellent l'API Anthropic directement
        depuis ton navigateur. Renseigne ta propre clé API pour les activer.
      </p>
      <Field label="Clé API Anthropic">
        <input type="password" value={key} onChange={(e) => setKey(e.target.value)} placeholder="sk-ant-..." />
      </Field>
      <div className="cv-alert cv-alert-info">
        <Icon name="info" size={14} />
        <span>Ta clé est stockée uniquement dans ce navigateur (localStorage), jamais envoyée ailleurs qu'à l'API Anthropic. Crée-la sur console.anthropic.com → API Keys, et de préférence avec une limite de dépense.</span>
      </div>
      <div className="cv-modal-actions">
        <button className="cv-btn cv-btn-ghost" onClick={onClose}>Fermer</button>
        <button className="cv-btn cv-btn-primary" onClick={save}><Icon name="key" size={14} /> Enregistrer</button>
      </div>
      {saved && <p className="cv-small" style={{ color: "#445032", marginTop: 8 }}><Icon name="check" size={13} /> Clé enregistrée.</p>}
    </Modal>
  );
}

/* ---------------------------------------------------------
   AJOUT D'UNE BOUTEILLE
--------------------------------------------------------- */
function AddBottleModal({ onClose, onSave }) {
  const [mode, setMode] = useState("photo");
  const [analyzing, setAnalyzing] = useState(false);
  const [error, setError] = useState("");
  const [photoB64, setPhotoB64] = useState(null);
  const [form, setForm] = useState({ name: "", vintage: "", type: "rouge", region: "", appellation: "", cepage: "", quantity: 1, price: "", apogeeFrom: "", apogeeTo: "", notes: "" });
  const fileRef = useRef(null);
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setError(""); setAnalyzing(true);
    try {
      const b64 = await fileToResizedBase64(file);
      setPhotoB64(b64);
      const raw = await callClaude({
        system: "Tu es sommelier expert. Observe la photo d'une bouteille de vin et identifie ses caractéristiques. " +
          "Réponds UNIQUEMENT avec un JSON valide, sans texte autour, au format exact: " +
          '{"name":"","vintage":"","type":"rouge|blanc|rose|effervescent","region":"","appellation":"","cepage":""}. ' +
          "Si une information n'est pas lisible sur l'étiquette, laisse une chaîne vide. N'invente pas de valeur non visible.",
        text: "Identifie cette bouteille.", images: [b64], maxTokens: 500,
      });
      const parsed = extractJSON(raw);
      if (parsed) {
        setForm((f) => ({ ...f, name: parsed.name || f.name, vintage: parsed.vintage || f.vintage,
          type: WINE_TYPES[parsed.type] ? parsed.type : f.type, region: parsed.region || f.region,
          appellation: parsed.appellation || f.appellation, cepage: parsed.cepage || f.cepage }));
      } else {
        setError("Photo ajoutée, mais l'étiquette n'a pas pu être lue. Complète les champs manuellement.");
      }
    } catch (err) {
      setError(err.message + " — tu peux compléter les champs à la main.");
    } finally { setAnalyzing(false); }
  }

  function submit() {
    if (!form.name.trim()) { setError("Donne au moins un nom à la bouteille."); return; }
    const qty = Math.max(1, parseInt(form.quantity, 10) || 1);
    onSave({
      id: uid(), name: form.name.trim(), vintage: form.vintage.trim(), type: form.type,
      region: form.region.trim(), appellation: form.appellation.trim(), cepage: form.cepage.trim(),
      quantity: qty, price: form.price ? parseFloat(form.price) : null,
      apogeeFrom: form.apogeeFrom.trim(), apogeeTo: form.apogeeTo.trim(), notes: form.notes.trim(),
      photo: photoB64, dateAdded: new Date().toISOString(),
    }, qty);
  }

  return (
    <Modal title="Ajouter une bouteille" onClose={onClose}>
      <div className="cv-tabs">
        <button className={mode === "photo" ? "active" : ""} onClick={() => setMode("photo")}><Icon name="camera" size={14} /> Photo</button>
        <button className={mode === "manuel" ? "active" : ""} onClick={() => setMode("manuel")}><Icon name="notes" size={14} /> Manuel</button>
      </div>
      {mode === "photo" && (
        <div className="cv-photo-zone">
          {photoB64 ? <img className="cv-photo-preview" src={"data:image/jpeg;base64," + photoB64} alt="Bouteille" />
            : <button className="cv-upload-box" onClick={() => fileRef.current.click()}><Icon name="camera" size={26} /><span>Prendre ou importer une photo de l'étiquette</span></button>}
          <input ref={fileRef} type="file" accept="image/*" capture="environment" hidden onChange={handleFile} />
          {photoB64 && <button className="cv-link-btn" onClick={() => fileRef.current.click()}>Changer la photo</button>}
          {analyzing && <Spinner label="Lecture de l'étiquette..." />}
        </div>
      )}
      {error && <div className="cv-alert"><Icon name="alert" size={14} /> {error}</div>}
      <div className="cv-form-grid">
        <Field label="Nom du vin *"><input value={form.name} onChange={set("name")} placeholder="Château..." /></Field>
        <Field label="Millésime"><input value={form.vintage} onChange={set("vintage")} placeholder="2019" /></Field>
        <Field label="Type"><select value={form.type} onChange={set("type")}>{TYPE_ORDER.map((t) => <option key={t} value={t}>{WINE_TYPES[t].label}</option>)}</select></Field>
        <Field label="Quantité"><input type="number" min="1" value={form.quantity} onChange={set("quantity")} /></Field>
        <Field label="Région"><input value={form.region} onChange={set("region")} placeholder="Bordeaux..." /></Field>
        <Field label="Appellation"><input value={form.appellation} onChange={set("appellation")} placeholder="Saint-Émilion..." /></Field>
        <Field label="Cépage(s)"><input value={form.cepage} onChange={set("cepage")} placeholder="Merlot, Cabernet..." /></Field>
        <Field label="Prix d'achat (€)"><input type="number" step="0.01" value={form.price} onChange={set("price")} placeholder="25" /></Field>
        <Field label="Apogée - de"><input value={form.apogeeFrom} onChange={set("apogeeFrom")} placeholder="2024" /></Field>
        <Field label="Apogée - à"><input value={form.apogeeTo} onChange={set("apogeeTo")} placeholder="2030" /></Field>
      </div>
      <Field label="Notes personnelles"><textarea rows={2} value={form.notes} onChange={set("notes")} placeholder="Cadeau, coup de cœur au caveau..." /></Field>
      <div className="cv-modal-actions">
        <button className="cv-btn cv-btn-ghost" onClick={onClose}>Annuler</button>
        <button className="cv-btn cv-btn-primary" onClick={submit}><Icon name="plus" size={14} /> Ajouter à la cave</button>
      </div>
    </Modal>
  );
}

function CaveView({ bottles, addBottle, applyMovement }) {

          <p>{bottles.length === 0 ? "Ta cave est vide pour l'instant." : "Aucune bouteille de ce type."}</p>

  );
}

--------------------------------------------------------- */
function PlatVinView({ bottles }) {
  const [dishText, setDishText] = useState("");
  const [photoB64, setPhotoB64] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [result, setResult] = useState(null);
  const fileRef = useRef(null);

  async function handlePhoto(e) { const file = e.target.files[0]; if (!file) return; setPhotoB64(await fileToResizedBase64(file)); }

  async function run() {
    if (!dishText.trim() && !photoB64) { setError("Décris ton plat ou ajoute une photo de l'assiette."); return; }
    if (bottles.length === 0) { setError("Ta cave est vide : ajoute des bouteilles d'abord."); return; }
    setError(""); setLoading(true); setResult(null);
    try {
      const caveJson = JSON.stringify(bottles.filter((b) => b.quantity > 0).map((b) => ({ id: b.id, name: b.name, type: b.type, vintage: b.vintage, region: b.region, appellation: b.appellation, cepage: b.cepage, quantity: b.quantity })));
      const raw = await callClaude({
        system: "Tu es sommelier. On te donne une cave à vin (JSON) et un plat (texte et/ou photo). Choisis LA meilleure bouteille de la cave pour ce plat (uniquement parmi les id fournis). Réponds UNIQUEMENT en JSON: " +
          '{"bottleId":"","reasoning":"2-3 phrases expliquant l\'accord","temperature":"ex: 16-18°C","decantage":"ex: carafer 30 min avant, ou Non nécessaire","verre":"type de verre conseillé","moment":"conseil de service"}',
        text: "Cave disponible: " + caveJson + (dishText ? "\nPlat décrit: " + dishText : "\nPlat visible sur la photo jointe."),
        images: photoB64 ? [photoB64] : [], maxTokens: 700,
      });
      const parsed = extractJSON(raw);
      if (!parsed || !parsed.bottleId) throw new Error("Réponse imprécise, réessaie.");
      const bottle = bottles.find((b) => b.id === parsed.bottleId);
      if (!bottle) throw new Error("Bouteille suggérée introuvable dans la cave.");
      setResult({ ...parsed, bottle });
    } catch (err) { setError(err.message || "Une erreur est survenue."); } finally { setLoading(false); }
  }

  return (
    <div>
      <div className="cv-view-head"><div><h2>Plat → Vin</h2><p className="cv-muted">Décris ton plat, on te trouve le meilleur accord dans ta cave.</p></div></div>
      <div className="cv-panel">
        <Field label="Ton plat"><textarea rows={3} value={dishText} onChange={(e) => setDishText(e.target.value)} placeholder="Ex : magret de canard, sauce au miel et épices..." /></Field>
        <div className="cv-photo-inline">
          {photoB64 ? <img className="cv-photo-preview-sm" src={"data:image/jpeg;base64," + photoB64} alt="Plat" />
            : <button className="cv-upload-box cv-upload-box-sm" onClick={() => fileRef.current.click()}><Icon name="camera" size={18} /><span>Photo de l'assiette (optionnel)</span></button>}
          <input ref={fileRef} type="file" accept="image/*" capture="environment" hidden onChange={handlePhoto} />
          {photoB64 && <button className="cv-link-btn" onClick={() => setPhotoB64(null)}>Retirer la photo</button>}
        </div>
        {error && <div className="cv-alert"><Icon name="alert" size={14} /> {error}</div>}
        <button className="cv-btn cv-btn-primary" onClick={run} disabled={loading}>{loading ? <span className="cv-spin-circle"></span> : <Icon name="chef" size={14} />} Trouver le vin idéal</button>
      </div>
      {result && (
        <div className="cv-result">
          <div className="cv-result-bottle">
            <BottleIcon type={result.bottle.type} size={50} />
            <div><p className="cv-tag" style={{ color: WINE_TYPES[result.bottle.type].shoulder }}>{WINE_TYPES[result.bottle.type].label}{result.bottle.vintage ? " · " + result.bottle.vintage : ""}</p><h3>{result.bottle.name}</h3></div>
          </div>
          <p className="cv-reasoning">{result.reasoning}</p>
          <div className="cv-service-grid">
            <div><Icon name="thermo" size={15} /><span>{result.temperature || "—"}</span></div>
            <div><Icon name="glass" size={15} /><span>{result.verre || "—"}</span></div>
            <div><Icon name="clock" size={15} /><span>{result.decantage || "—"}</span></div>
            <div><Icon name="info" size={15} /><span>{result.moment || "—"}</span></div>
          </div>
        </div>
      )}
    </div>
  );
}

function VinPlatView({ bottles }) {
  const [bottleId, setBottleId] = useState("");
  const [mainIngredient, setMainIngredient] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [suggestions, setSuggestions] = useState(null);

  async function run() {
    const bottle = bottles.find((b) => b.id === bottleId);
    if (!bottle) { setError("Choisis une bouteille de ta cave."); return; }
    setError(""); setLoading(true); setSuggestions(null);
    try {
      const raw = await callClaude({
        system: "Tu es sommelier. On te donne une bouteille de vin et éventuellement un ingrédient principal imposé. Propose EXACTEMENT 3 plats qui s'accordent, du plus classique au plus original. Réponds UNIQUEMENT en JSON: " +
          '{"suggestions":[{"plat":"","description":"1-2 phrases","pourquoi":"1 phrase sur l\'accord"}]}',
        text: "Bouteille: " + bottle.name + ", type " + WINE_TYPES[bottle.type].label + ", millésime " + (bottle.vintage || "inconnu") + ", région " + (bottle.region || "inconnue") + ", cépage " + (bottle.cepage || "inconnu") + "." + (mainIngredient.trim() ? " Ingrédient principal imposé: " + mainIngredient.trim() + "." : ""),
        maxTokens: 700,
      });
      const parsed = extractJSON(raw);
      if (!parsed || !parsed.suggestions) throw new Error("Réponse imprécise, réessaie.");
      setSuggestions(parsed.suggestions.slice(0, 3));
    } catch (err) { setError(err.message || "Une erreur est survenue."); } finally { setLoading(false); }
  }

  return (
    <div>
      <div className="cv-view-head"><div><h2>Vin → Plat</h2><p className="cv-muted">Choisis une bouteille, reçois jusqu'à 3 idées de plats.</p></div></div>
      <div className="cv-panel">
        <Field label="Bouteille">
          <select value={bottleId} onChange={(e) => setBottleId(e.target.value)}>
            <option value="">— Choisir une bouteille —</option>
            {bottles.map((b) => <option key={b.id} value={b.id}>{b.name}{b.vintage ? " (" + b.vintage + ")" : ""}</option>)}
          </select>
        </Field>
        <Field label="Composant principal (optionnel)"><input value={mainIngredient} onChange={(e) => setMainIngredient(e.target.value)} placeholder="Ex : porc, saint-jacques, champignons..." /></Field>
        {error && <div className="cv-alert"><Icon name="alert" size={14} /> {error}</div>}
        <button className="cv-btn cv-btn-primary" onClick={run} disabled={loading}>{loading ? <span className="cv-spin-circle"></span> : <Icon name="sparkles" size={14} />} Suggérer des plats</button>
      </div>
      {suggestions && (
        <div className="cv-suggestions">
          {suggestions.map((s, i) => (
            <div className="cv-suggestion-card" key={i}>
              <span className="cv-suggestion-num">{i + 1}</span>
              <h4>{s.plat}</h4>
              <p className="cv-small">{s.description}</p>
              <p className="cv-small cv-muted cv-why"><Icon name="grape" size={12} /> {s.pourquoi}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AnalyseView() {
  const [photoB64, setPhotoB64] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingLabel, setLoadingLabel] = useState("Analyse en cours...");
  const [error, setError] = useState("");
  const [analysis, setAnalysis] = useState(null);
  const fileRef = useRef(null);

  async function handlePhoto(e) { const file = e.target.files[0]; if (!file) return; setPhotoB64(await fileToResizedBase64(file)); setAnalysis(null); }

  async function run() {
    if (!photoB64) { setError("Prends d'abord une photo de l'étiquette."); return; }
    setError(""); setLoading(true); setAnalysis(null); setLoadingLabel("Lecture de l'étiquette...");
    try {
      setTimeout(() => setLoadingLabel("Recherche d'avis et de prix en ligne..."), 1800);
      const raw = await callClaude({
        system: "Tu es sommelier expert et critique vin. On te montre la photo de l'étiquette d'une bouteille. Identifie le vin puis recherche sur le web des informations fiables et récentes (avis, prix, notes). Réponds UNIQUEMENT en JSON, sans texte autour: " +
          '{"nom":"","qualite":"note ou appréciation qualitative, 2-3 phrases","prix":"fourchette de prix constatée","accompagnement":"suggestions de plats, 1-2 phrases","avisGeneral":"synthèse des avis trouvés, 2-3 phrases","conseilOuverture":"température, carafage, verre","apogee":"fenêtre de consommation idéale"}. ' +
          "Si une information reste introuvable, indique-le honnêtement plutôt que d'inventer.",
        text: "Analyse cette bouteille.", images: [photoB64], webSearch: true, maxTokens: 1200,
      });
      const parsed = extractJSON(raw);
      if (!parsed) throw new Error("Impossible d'interpréter l'analyse, réessaie.");
      setAnalysis(parsed);
    } catch (err) { setError(err.message || "Une erreur est survenue."); } finally { setLoading(false); }
  }

  return (
    <div>
      <div className="cv-view-head"><div><h2>Analyser une bouteille</h2><p className="cv-muted">Scanne n'importe quelle étiquette pour un avis complet.</p></div></div>
      <div className="cv-panel">
        {photoB64 ? <img className="cv-photo-preview" src={"data:image/jpeg;base64," + photoB64} alt="Étiquette" />
          : <button className="cv-upload-box" onClick={() => fileRef.current.click()}><Icon name="scan" size={26} /><span>Scanner l'étiquette</span></button>}
        <input ref={fileRef} type="file" accept="image/*" capture="environment" hidden onChange={handlePhoto} />
        {photoB64 && <button className="cv-link-btn" onClick={() => fileRef.current.click()}>Changer la photo</button>}
        {error && <div className="cv-alert"><Icon name="alert" size={14} /> {error}</div>}
        {loading ? <Spinner label={loadingLabel} /> : <button className="cv-btn cv-btn-primary" onClick={run}><Icon name="scan" size={14} /> Analyser cette bouteille</button>}
      </div>
      {analysis && (
        <div className="cv-analysis">
          <h3>{analysis.nom}</h3>
          <div className="cv-analysis-grid">
            <div className="cv-analysis-item"><Icon name="trend" size={16} /><div><span className="lbl">Qualité</span><p>{analysis.qualite}</p></div></div>
            <div className="cv-analysis-item"><Icon name="euro" size={16} /><div><span className="lbl">Prix</span><p>{analysis.prix}</p></div></div>
            <div className="cv-analysis-item"><Icon name="chef" size={16} /><div><span className="lbl">Accompagnement</span><p>{analysis.accompagnement}</p></div></div>
            <div className="cv-analysis-item"><Icon name="check" size={16} /><div><span className="lbl">Avis général</span><p>{analysis.avisGeneral}</p></div></div>
            <div className="cv-analysis-item"><Icon name="thermo" size={16} /><div><span className="lbl">Conseil d'ouverture</span><p>{analysis.conseilOuverture}</p></div></div>
            <div className="cv-analysis-item"><Icon name="calendar" size={16} /><div><span className="lbl">Apogée</span><p>{analysis.apogee}</p></div></div>
          </div>
        </div>
      )}
    </div>
  );
}

const NAV = [
  { id: "cave", label: "Ma cave", icon: "wine" },
  { id: "platVin", label: "Plat → Vin", icon: "chef" },

function CaveAVinApp() {
  const [view, setView] = useState("cave");
  const [bottles, setBottles] = useState([]);
  const [movements, setMovements] = useState([]);
  const [showSettings, setShowSettings] = useState(false);
  const [hasKey, setHasKey] = useState(!!getApiKey());

  useEffect(() => { const d = loadCaveData(); setBottles(d.bottles || []); setMovements(d.movements || []); }, []);
  useEffect(() => { saveCaveData({ bottles, movements }); }, [bottles, movements]);

  const addBottle = useCallback((bottle, qty) => {
    setBottles((prev) => [bottle, ...prev]);
    setMovements((prev) => [{ id: uid(), bottleId: bottle.id, bottleName: bottle.name, kind: "in", qty, date: new Date().toISOString() }, ...prev]);
  }, []);

  const applyMovement = useCallback((bottleId, kind, qty) => {
    setBottles((prev) => prev.map((b) => b.id === bottleId ? { ...b, quantity: kind === "out" ? Math.max(0, b.quantity - qty) : b.quantity + qty } : b));
    setBottles((prev) => {
      const b = prev.find((x) => x.id === bottleId);
      if (b) setMovements((mv) => [{ id: uid(), bottleId, bottleName: b.name, kind, qty, date: new Date().toISOString() }, ...mv]);
      return prev;
    });
  }, []);

  return (
    <div className="cv-root">
      <aside className="cv-sidebar">
        <div className="cv-brand"><Icon name="wine" size={19} /><span>Ma Cave</span></div>
        <nav>
          {NAV.map((n) => (
            <button key={n.id} className={"cv-nav-btn" + (view === n.id ? " active" : "")} onClick={() => setView(n.id)}>
              <Icon name={n.icon} size={16} /><span>{n.label}</span>
              {view === n.id && <Icon name="chevron" size={14} />}
            </button>
          ))}
        </nav>
        <div className="cv-nav-foot">
          <button className="cv-nav-btn" onClick={() => setShowSettings(true)}>
            <Icon name="gear" size={16} /><span>Réglages</span>
            {!hasKey && <span title="Clé API manquante" style={{ color: "#B23A56" }}>●</span>}
          </button>
        </div>
      </aside>
      <main className="cv-main">
        {view === "cave" && <CaveView bottles={bottles} addBottle={addBottle} applyMovement={applyMovement} />}
        {view === "platVin" && <PlatVinView bottles={bottles} />}
        {view === "vinPlat" && <VinPlatView bottles={bottles} />}
        {view === "analyse" && <AnalyseView />}
      </main>
      {showSettings && <SettingsModal onClose={() => { setShowSettings(false); setHasKey(!!getApiKey()); }} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CaveAVinApp />);
</script>
</body>
</html>
