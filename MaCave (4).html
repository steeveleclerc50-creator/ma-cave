<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Ma Cave" />
<title>Ma Cave à Vin</title>
<link rel="icon" href="data:,">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: #F5F5F2; }
#root { min-height: 100vh; }

:root {
  --bg: #F5F5F2; --surface: #FFFFFF; --ink: #211D1B; --ink-soft: #6E6862;
  --wine: #6E1530; --wine-deep: #4E0F22; --line: #E6E2DA;
}
.cv-root { display: flex; min-height: 100vh; background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; }
.cv-sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--line); padding: 24px 14px; display: flex; flex-direction: column; gap: 20px; }
.cv-brand { display: flex; align-items: center; gap: 8px; font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; color: var(--wine-deep); padding: 0 8px; }
.cv-sidebar nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.cv-nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: none; background: none; border-radius: 8px; font-family: 'Inter'; font-size: 14px; font-weight: 500; color: var(--ink-soft); cursor: pointer; text-align: left; transition: background .15s, color .15s; width: 100%; }
.cv-nav-btn:hover { background: #F0EDE6; color: var(--ink); }
.cv-nav-btn.active { background: var(--wine-deep); color: #fff; }
.cv-nav-btn span:first-of-type { flex: 1; }
.cv-nav-foot { border-top: 1px solid var(--line); padding-top: 10px; }
.cv-main { flex: 1; padding: 32px 40px; overflow-y: auto; max-width: 1100px; }
.cv-view-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.cv-view-head h2 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin: 0 0 4px; }
.cv-muted { color: var(--ink-soft); font-size: 13.5px; margin: 0; }
.cv-small { font-size: 12.5px; }
.cv-chip-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

.cv-kpi-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }

.cv-gate-screen { min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.cv-gate-card { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 28px; max-width: 460px; width: 100%; }
.cv-gate-title { font-family: 'Fraunces', serif; font-size: 22px; margin: 0 0 10px; }
.cv-settings-cloud-block { margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--line); }
.cv-kpi { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 12px 18px; min-width: 140px; }
.cv-kpi strong { display: block; font-family: 'IBM Plex Mono'; font-size: 20px; margin-top: 2px; }
.cv-dash-grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 16px; align-items: start; }
.cv-dash-title { font-family: 'Fraunces', serif; font-size: 16px; margin: 0 0 16px; }
.cv-donut-wrap { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.cv-donut { width: 140px; height: 140px; border-radius: 50%; position: relative; flex-shrink: 0; }
.cv-donut-hole { position: absolute; inset: 14px; background: var(--surface); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.cv-donut-hole strong { font-family: 'IBM Plex Mono'; font-size: 20px; }
.cv-donut-hole span { font-size: 11px; color: var(--ink-soft); }
.cv-donut-legend { display: flex; flex-direction: column; gap: 8px; }
.cv-legend-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.cv-legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.cv-legend-label { flex: 1; }
.cv-legend-value { font-family: 'IBM Plex Mono'; color: var(--ink-soft); }
.cv-bars-chart { display: flex; gap: 20px; align-items: flex-end; height: 220px; padding: 10px 4px 0; }
.cv-bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; }
.cv-bar-track { flex: 1; width: 100%; max-width: 56px; display: flex; align-items: flex-end; }
.cv-bar-stack { width: 100%; display: flex; flex-direction: column-reverse; border-radius: 6px 6px 0 0; overflow: hidden; min-height: 2px; }
.cv-bar-segment { width: 100%; }
.cv-bar-total { font-family: 'IBM Plex Mono'; font-size: 13px; margin-top: 8px; }
.cv-bar-label { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.cv-bars-legend { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
.cv-bars-legend-group { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
.cv-bars-legend-items { display: flex; flex-wrap: wrap; gap: 6px; }
.cv-bars-legend-items .cv-chip { display: flex; align-items: center; gap: 5px; border-width: 1.5px; cursor: default; }
.cv-chip { border: 1px solid var(--line); background: var(--surface); padding: 6px 14px; border-radius: 999px; font-size: 13px; cursor: pointer; color: var(--ink-soft); }
.cv-chip.active { background: var(--wine-deep); border-color: var(--wine-deep); color: #fff; }
.cv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
.cv-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; cursor: pointer; display: flex; flex-direction: column; transition: box-shadow .15s, transform .15s; }
.cv-card:hover { box-shadow: 0 6px 18px rgba(33,29,27,0.08); transform: translateY(-1px); }
.cv-card-visual { display: flex; align-items: center; justify-content: center; padding: 16px; position: relative; }
.cv-qty-badge { position: absolute; top: 10px; right: 12px; background: var(--wine-deep); color: #fff; font-family: 'IBM Plex Mono'; font-size: 11px; padding: 2px 7px; border-radius: 999px; }
.cv-card-body { padding: 12px 14px 6px; flex: 1; }
.cv-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.cv-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.cv-vintage { font-family: 'IBM Plex Mono'; font-size: 12px; color: var(--ink-soft); }
.cv-card-body h4 { font-family: 'Fraunces', serif; font-size: 15.5px; margin: 0 0 4px; font-weight: 600; line-height: 1.25; }
.cv-apogee { display: flex; align-items: center; gap: 4px; color: var(--ink-soft); margin: 4px 0 0; }
.cv-card-actions { display: flex; gap: 6px; padding: 10px 14px 14px; }
.cv-mini-btn { flex: 1; border: 1px solid var(--line); background: var(--bg); border-radius: 7px; padding: 6px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); font-size: 15px; }
.cv-mini-btn:hover:not(:disabled) { background: var(--wine-deep); color: #fff; border-color: var(--wine-deep); }
.cv-mini-btn:disabled { opacity: .35; cursor: not-allowed; }
.cv-empty { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 60px 20px; color: var(--ink-soft); background: var(--surface); border: 1px dashed var(--line); border-radius: 12px; text-align: center; }
.cv-btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; font-family: 'Inter'; }
.cv-btn-primary { background: var(--wine-deep); color: #fff; }
.cv-btn-primary:hover:not(:disabled) { background: var(--wine); }
.cv-btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.cv-btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
.cv-modal-overlay { position: fixed; inset: 0; background: rgba(33,29,27,0.45); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
.cv-modal { background: var(--surface); border-radius: 14px; max-width: 520px; width: 100%; max-height: 88vh; max-height: 88dvh; overflow-y: auto; display: flex; flex-direction: column; }
.cv-modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--surface); z-index: 3; flex-shrink: 0; }
.cv-modal-head h3 { font-family: 'Fraunces', serif; font-size: 18px; margin: 0; }
.cv-icon-btn { border: none; background: none; cursor: pointer; color: var(--ink-soft); padding: 4px; font-size: 18px; line-height: 1; }
.cv-modal-body { padding: 18px 20px 22px; }
.cv-modal-actions { position: sticky; bottom: 0; background: var(--surface); margin: 18px -20px -22px; padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px)); border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; z-index: 2; }
.cv-tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--bg); border-radius: 9px; padding: 4px; }
.cv-tabs button { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; border: none; background: none; padding: 8px 0; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; }
.cv-tabs button.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.cv-upload-box { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 28px 16px; border: 1.5px dashed var(--line); border-radius: 10px; background: var(--bg); cursor: pointer; color: var(--ink-soft); font-size: 13px; }
.cv-photo-source-row { display: flex; gap: 10px; flex-wrap: wrap; }
.cv-photo-source-row .cv-upload-box { flex: 1; min-width: 130px; padding: 20px 10px; text-align: center; font-size: 12.5px; }
.cv-photo-source-row .cv-link-btn { flex: 1; }
.cv-upload-box-sm { padding: 16px; }
.cv-photo-zone { margin-bottom: 16px; }
.cv-photo-preview { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; }
.cv-photo-preview-sm { width: 100%; max-height: 140px; object-fit: cover; border-radius: 10px; }
.cv-photo-inline { margin: 12px 0; }
.cv-link-btn { border: none; background: none; color: var(--wine-deep); font-size: 12.5px; font-weight: 600; cursor: pointer; padding: 0; }
.cv-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
.cv-field { display: flex; flex-direction: column; gap: 5px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); margin-top: 12px; }
.cv-field input, .cv-field select, .cv-field textarea { border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; font-size: 14px; font-family: 'Inter'; color: var(--ink); background: var(--bg); }
.cv-field input:focus, .cv-field select:focus, .cv-field textarea:focus { outline: 2px solid var(--wine-deep); outline-offset: 1px; }
.cv-alert { display: flex; align-items: center; gap: 7px; background: #FBEAEC; color: #8A2340; padding: 9px 12px; border-radius: 8px; font-size: 12.5px; margin: 10px 0; }
.cv-alert-info { background: #EEF1E8; color: #445032; }
.cv-spinner { display: flex; align-items: center; gap: 10px; color: var(--ink-soft); font-size: 13px; padding: 10px 0; }
.cv-spin-circle { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--line); border-top-color: var(--wine-deep); animation: cv-rotate .8s linear infinite; flex-shrink: 0; }
@keyframes cv-rotate { to { transform: rotate(360deg); } }
.cv-panel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; max-width: 560px; }
.cv-result { margin-top: 22px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 20px; max-width: 560px; }
.cv-result-bottle { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.cv-result-bottle h3 { font-family: 'Fraunces', serif; margin: 2px 0 0; font-size: 18px; }
.cv-reasoning { font-size: 14px; line-height: 1.5; margin: 10px 0 16px; }
.cv-service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.cv-service-grid > div { display: flex; align-items: center; gap: 8px; background: var(--bg); border-radius: 8px; padding: 9px 11px; font-size: 12.5px; }
.cv-suggestions { display: grid; gap: 12px; margin-top: 20px; max-width: 560px; }
.cv-suggestion-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; position: relative; }
.cv-suggestion-num { position: absolute; top: -10px; left: 14px; background: var(--wine-deep); color: #fff; font-family: 'IBM Plex Mono'; font-size: 11px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cv-suggestion-card h4 { font-family: 'Fraunces', serif; margin: 4px 0 6px; font-size: 15.5px; }
.cv-why { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
.cv-analysis { margin-top: 22px; max-width: 640px; }
.cv-analysis h3 { font-family: 'Fraunces', serif; font-size: 20px; margin: 0 0 14px; }
.cv-analysis-title-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.cv-analysis-title-row h3 { margin: 0; }
.cv-analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cv-fav-photo { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; display: block; }
.cv-fav-note-preview { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: 4px; }
.cv-analysis-item { display: flex; gap: 10px; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
.cv-analysis-item span.lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--ink-soft); }
.cv-analysis-item p { margin: 3px 0 0; font-size: 13px; line-height: 1.4; }
.cv-detail-head { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; }
.cv-detail-visual { width: 90px; height: 90px; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.cv-detail-visual img { width: 100%; height: 100%; object-fit: cover; }
.cv-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.cv-detail-grid > div { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
.cv-detail-grid strong { display: block; font-family: 'IBM Plex Mono'; font-size: 14px; margin-top: 2px; }
.cv-notes { font-size: 13px; background: var(--bg); border-radius: 8px; padding: 10px 12px; display: flex; gap: 8px; }
.cv-key-row { display: flex; gap: 8px; align-items: center; }
.cv-key-row input { flex: 1; }
.cv-key-status { display: flex; align-items: center; gap: 6px; font-size: 12.5px; margin-top: 8px; }
.cv-emoji { display: inline-flex; align-items: center; justify-content: center; line-height: 1; }
@media (max-width: 760px) {
  .cv-root { flex-direction: column; }
  .cv-sidebar { width: 100%; flex-direction: row; align-items: center; padding: 10px 12px; overflow-x: auto; gap: 10px; }
  .cv-brand { padding: 0 4px; }
  .cv-sidebar nav { flex-direction: row; flex: none; }
  .cv-nav-foot { border-top: none; padding-top: 0; }
  .cv-nav-btn span:first-of-type { display: none; }
  .cv-main { padding: 18px; padding-bottom: 40px; }
  .cv-form-grid { grid-template-columns: 1fr; }
  .cv-analysis-grid { grid-template-columns: 1fr; }
  .cv-service-grid { grid-template-columns: 1fr; }
  .cv-dash-grid { grid-template-columns: 1fr; }
}
</style>
</head>
